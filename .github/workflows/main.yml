name: PAIT Tweak Force Modder

on:
  push:
    paths:
      - 'debs/**'
      - '.github/workflows/main.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Force Scan and Mod All Debs
        run: |
          cd debs
          for file in *.deb; do
            echo "Đang xử lý file: $file"
            mkdir -p mod_tmp/DEBIAN
            dpkg-deb -x "$file" mod_tmp
            dpkg-deb -e "$file" mod_tmp/DEBIAN
            
            # 1. Đổi Package ID
            ORIG_PACKAGE=$(grep "^Package: " mod_tmp/DEBIAN/control | cut -d' ' -f2)
            TWEAK_NAME=$(echo $ORIG_PACKAGE | sed 's/.*\.//')
            sed -i "s/^Package: .*/Package: com.phucanh.$TWEAK_NAME/" mod_tmp/DEBIAN/control
            
            # 2. Thay đổi nội dung bên trong tweak
            find mod_tmp -type f -exec sed -i 's/Ủng hộ/Website me: PhucAnhIT.Click/g' {} + 2>/dev/null || true
            find mod_tmp -type f -exec sed -i 's/Copyright @ 2025 by BVN999/Copyright @ 2026 by PAIT Repo/g' {} + 2>/dev/null || true
            find mod_tmp -type f -exec sed -i 's/Nhóm trò chuyện Tele BVN Repo/Trang Repo/g' {} + 2>/dev/null || true
            find mod_tmp -type f \( -name "*banner*" -o -name "*Banner*" \) -delete
            
            dpkg-deb -b mod_tmp "$file"
            rm -rf mod_tmp
          done
          cd ..

      - name: Update and Clean Packages
        run: |
          rm -f Packages Packages.bz2
          # Tạo file Packages gốc
          dpkg-scanpackages -m ./debs > Packages
          
          # PHẦN QUAN TRỌNG: Sửa trực tiếp file Packages để Sileo không hiện link cũ
          echo "Đang xóa dấu vết BVN trong file Packages..."
          
          # Thay đổi Author
          sed -i 's/Author: .*/Author: PhucAnhIT/' Packages
          # Xóa toàn bộ link Depiction, Icon, Sileodepiction của BVN
          sed -i '/bvnrepo999.github.io/d' Packages
          sed -i '/bvnsupport.github.io/d' Packages
          sed -i '/Depiction: http/d' Packages
          sed -i '/Sileodepiction: http/d' Packages
          # Bạn có thể thêm link Icon mặc định của bạn vào đây nếu muốn
          # sed -i '/Name: /a Icon: https://phucanhit.click/CydiaIcon.png' Packages
          
          # Nén file lại sau khi đã sạch sẽ
          bzip2 -c9 Packages > Packages.bz2

      - name: Commit and push
        run: |
          git config --global user.name "PAIT-Force-Bot"
          git config --global user.email "bot@phucanhit.click"
          git add .
          git commit -m "Force mod debs and Clean Packages list" || echo "No changes"
          git push
