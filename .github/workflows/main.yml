name: Auto Rename Package ID

on:
  push:
    paths:
      - 'debs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Rename Package ID
        run: |
          cd debs
          for file in *.deb; do
            # Bỏ qua nếu file đã được đổi tên (để tránh vòng lặp vô hạn)
            if [[ $file != phucanh_* ]]; then
              echo "Đang đổi mã cho file: $file"
              
              # 1. Xả nén file deb
              mkdir -p tmp_deb/DEBIAN
              dpkg-deb -x "$file" tmp_deb
              dpkg-deb -e "$file" tmp_deb/DEBIAN
              
              # 2. Dùng sed để đổi Package ID thành com.phucanh.tên-tweak
              # Nó sẽ giữ lại phần tên tweak cũ đằng sau và thay đoạn đầu
              sed -i 's/^Package: \(.*\)\.\(.*\)/Package: com.phucanh.\2/' tmp_deb/DEBIAN/control || \
              sed -i 's/^Package: \(.*\)/Package: com.phucanh.\1/' tmp_deb/DEBIAN/control
              
              # 3. Đóng gói lại với tên file mới
              dpkg-deb -b tmp_deb "phucanh_$file"
              
              # 4. Xóa file gốc và file tạm để repo sạch sẽ
              rm -rf tmp_deb "$file"
            fi
          done
          cd ..

      - name: Update Packages & Release
        run: |
          rm -f Packages Packages.bz2
          dpkg-scanpackages -m ./debs > Packages
          bzip2 -c9 Packages > Packages.bz2

      - name: Commit and push changes
        run: |
          git config --global user.name "PhucAnh-Auto-Rename"
          git config --global user.email "bot@phucanhit.click"
          git add .
          git commit -m "Auto rename Package ID to com.phucanh" || echo "No changes"
          git push
