name: Auto Patch & Rename Roothide

on:
  push:
    paths:
      - 'debs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev wget
          # Tải patcher bản dành cho Linux (link trực tiếp GitHub)
          wget https://github.com/roothide/Docker-Deb-Patcher/raw/main/patcher -O patcher
          chmod +x patcher

      - name: Process, Rename and Patch
        run: |
          cd debs
          for file in *.deb; do
            if [[ $file != roothide_* ]]; then
              echo "Đang xử lý file: $file"
              
              # 1. Xả nén sửa tên
              mkdir -p tmp_deb/DEBIAN
              dpkg-deb -x "$file" tmp_deb
              dpkg-deb -e "$file" tmp_deb/DEBIAN
              
              # 2. Sửa tên hiển thị trong file control
              sed -i 's/^Name: \(.*\)/Name: \1 (Roothide)/' tmp_deb/DEBIAN/control
              
              # 3. Đóng gói lại thành file trung gian
              dpkg-deb -b tmp_deb "to_patch_$file"
              
              # 4. Chạy lệnh patcher của Roothide
              # Cấu trúc: ./patcher -r <input> <output>
              ../patcher -r "to_patch_$file" "roothide_$file"
              
              # 5. Dọn dẹp file tạm
              rm -rf tmp_deb "to_patch_$file"
            fi
          done
          cd ..

      - name: Update Packages & Release
        run: |
          rm -f Packages Packages.bz2 Packages.gz
          dpkg-scanpackages -m ./debs > Packages
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz

      - name: Commit and push changes
        run: |
          git config --global user.name "PhucAnh-Bot"
          git config --global user.email "bot@phucanhit.click"
          git add .
          git commit -m "Auto patch (Roothide) success" || echo "No changes"
          git push
