name: PAIT Clean Repo Update

on:
  push:
    paths:
      - 'debs/**'
      - '.github/workflows/main.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Environment
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev bzip2 gzip

      - name: Generate Clean Packages
        run: |
          # 1. Xóa sạch dấu vết cũ
          rm -f Packages Packages.bz2 Packages.gz
          
          # 2. Quét toàn bộ file trong debs
          dpkg-scanpackages -m ./debs > Packages
          
          # 3. DÙNG LỆNH SED ĐỂ "THAY TÊN ĐỔI HỌ" TRÊN DANH SÁCH (KHÔNG LỖI FILE)
          # Đổi toàn bộ Package ID sang com.phucanh
          sed -i 's/Package: \(.*\)/Package: com.phucanh.\1/' Packages
          # Xóa các đoạn ID thừa bị lặp (nếu có)
          sed -i 's/com.phucanh.com.phucanh/com.phucanh/g' Packages
          
          # Đổi Tác giả & Người duy trì
          sed -i 's/Author: .*/Author: Phúc Anh Dev/' Packages
          sed -i 's/Maintainer: .*/Maintainer: Trần Phúc Anh IT/' Packages
          
          # XOÁ SẠCH LINK CỦA BÊN KHÁC (BVN, jtisvn...)
          sed -i '/Depiction/d' Packages
          sed -i '/Sileodepiction/d' Packages
          sed -i '/Icon/d' Packages
          sed -i '/bvn/d' Packages
          sed -i '/jtisvn/d' Packages
          
          # THÊM WEBSITE CỦA BẠN VÀO MÔ TẢ TWEAK
          sed -i 's/Description: \(.*\)/Description: \1 | Website: PhucAnhIT.Click | Copyright 2026 PAIT Repo/' Packages

          # 4. Đóng gói chuẩn 3 định dạng cho mọi loại trình quản lý (Sileo, Cydia, Zebra)
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz
          # Giữ lại file Packages gốc cho Sileo đời mới

      - name: Deploy Changes
        run: |
          git config --global user.name "PhucAnh-Bot"
          git config --global user.email "bot@phucanhit.click"
          git add .
          git commit -m "PAIT Repo: Refreshed & Cleaned" || echo "No changes"
          git push
