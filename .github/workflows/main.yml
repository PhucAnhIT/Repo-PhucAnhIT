name: PAIT Tweak Force Modder

on:
  push:
    paths:
      - 'debs/**'
      - '.github/workflows/main.yml' # Lưu file này là Bot đi "càn quét" ngay
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Force Scan and Mod All Debs
        run: |
          cd debs
          for file in *.deb; do
            echo "Đang ép quét và sửa file: $file"
            
            # Tạo thư mục tạm
            mkdir -p mod_tmp/DEBIAN
            
            # Xả nén file deb
            dpkg-deb -x "$file" mod_tmp
            dpkg-deb -e "$file" mod_tmp/DEBIAN
            
            # 1. Đổi Package ID sang com.phucanh (luôn thực thi)
            # Lấy tên tweak gốc (phần sau dấu chấm cuối cùng hoặc toàn bộ nếu không có chấm)
            ORIG_PACKAGE=$(grep "^Package: " mod_tmp/DEBIAN/control | cut -d' ' -f2)
            TWEAK_NAME=$(echo $ORIG_PACKAGE | sed 's/.*\.//')
            sed -i "s/^Package: .*/Package: com.phucanh.$TWEAK_NAME/" mod_tmp/DEBIAN/control
            
            # 2. Thay đổi nội dung hiển thị (Website, Copyright, Trang Repo)
            # Quét sạch sành sanh mọi file text trong tweak
            find mod_tmp -type f -exec sed -i 's/Ủng hộ/Website me: PhucAnhIT.Click/g' {} + 2>/dev/null || true
            find mod_tmp -type f -exec sed -i 's/Copyright @ 2025 by BVN999/Copyright @ 2026 by PAIT Repo/g' {} + 2>/dev/null || true
            find mod_tmp -type f -exec sed -i 's/Nhóm trò chuyện Tele BVN Repo/Trang Repo/g' {} + 2>/dev/null || true
            
            # 3. Xóa sổ Banner cũ (Xóa triệt để các file ảnh banner)
            find mod_tmp -type f \( -name "*banner*" -o -name "*Banner*" \) -delete
            
            # 4. Đóng gói đè trực tiếp lên file cũ
            dpkg-deb -b mod_tmp "$file"
            
            # Dọn dẹp thư mục tạm để làm file tiếp theo
            rm -rf mod_tmp
            echo "=> Đã xử lý xong: $file"
          done
          cd ..

      - name: Update Packages
        run: |
          rm -f Packages Packages.bz2
          dpkg-scanpackages -m ./debs > Packages
          bzip2 -c9 Packages > Packages.bz2

      - name: Commit and push
        run: |
          git config --global user.name "PAIT-Force-Bot"
          git config --global user.email "bot@phucanhit.click"
          git add .
          git commit -m "Force mod all tweaks with new settings" || echo "No changes"
          git push
