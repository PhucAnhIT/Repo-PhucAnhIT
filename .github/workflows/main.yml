name: PAIT Force Fix 100 Percent

on:
  push:
    paths:
      - 'debs/**'
      - '.github/workflows/main.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev bzip2 gzip

      - name: Force Clean and Rebuild
        run: |
          cd debs
          for file in *.deb; do
            mkdir -p tmp/DEBIAN
            dpkg-deb -x "$file" tmp
            dpkg-deb -e "$file" tmp/DEBIAN
            
            # Ép ID theo tên file để KHÔNG BAO GIỜ trùng
            NEW_ID=$(echo "$file" | sed 's/\.deb//' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
            sed -i "s/^Package: .*/Package: com.phucanh.$NEW_ID/" tmp/DEBIAN/control
            
            # Xóa sạch dấu vết cũ
            sed -i '/Depiction/d' tmp/DEBIAN/control
            sed -i '/Sileodepiction/d' tmp/DEBIAN/control
            sed -i '/Icon/d' tmp/DEBIAN/control
            
            dpkg-deb -b tmp "$file"
            rm -rf tmp
          done
          cd ..

      - name: Build Packages & Release
        run: |
          rm -f Packages Packages.bz2 Packages.gz Release
          dpkg-scanpackages -m ./debs > Packages
          
          # Xóa sạch link BVN trong Packages
          sed -i '/bvn/d' Packages
          sed -i '/Depiction/d' Packages
          
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz
          
          # TẠO FILE RELEASE (Cái này quan trọng để Sileo refresh)
          echo "Origin: PhucAnhIT Repo" > Release
          echo "Label: PhucAnhIT" >> Release
          echo "Suite: stable" >> Release
          echo "Version: $(date +%s)" >> Release
          echo "Codename: ios" >> Release
          echo "Architectures: iphoneos-arm iphoneos-arm64" >> Release
          echo "Components: main" >> Release
          echo "Description: Repo PhucAnhIT Da Fix Loi" >> Release

      - name: Push
        run: |
          git config --global user.name "PAIT-Bot"
          git config --global user.email "bot@phucanhit.click"
          git add .
          git commit -m "Force Update Repo Fix Cache" || echo "No changes"
          git push
