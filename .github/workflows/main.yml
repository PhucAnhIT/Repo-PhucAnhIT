name: PAIT Force Update Repo

on:
  push:
    paths:
      - 'debs/**'
      - '.github/workflows/main.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Force Mod & Unique ID
        run: |
          cd debs
          for file in *.deb; do
            echo "Đang xử lý: $file"
            mkdir -p tmp/DEBIAN
            dpkg-deb -x "$file" tmp
            dpkg-deb -e "$file" tmp/DEBIAN
            
            # TẠO ID DUY NHẤT: Lấy tên file, bỏ đuôi .deb, thay dấu gạch dưới và chấm thành gạch ngang
            # Điều này giúp Sileo coi mỗi file là 1 tweak riêng biệt hoàn toàn
            NEW_PACKAGE_ID=$(echo "$file" | sed 's/\.deb//' | tr '._' '-' | tr '[:upper:]' '[:lower:]')
            sed -i "s/^Package: .*/Package: com.phucanh.$NEW_PACKAGE_ID/" tmp/DEBIAN/control
            
            # Thay đổi tên tác giả và Maintainer
            sed -i "s/^Author: .*/Author: PhucAnhIT/" tmp/DEBIAN/control
            sed -i "s/^Maintainer: .*/Maintainer: PhucAnhIT/" tmp/DEBIAN/control
            
            # Xóa các link rác của BVN trong file control
            sed -i '/Depiction/d' tmp/DEBIAN/control
            sed -i '/Sileodepiction/d' tmp/DEBIAN/control
            sed -i '/Icon/d' tmp/DEBIAN/control
            
            # Sửa câu chữ hiển thị
            find tmp -type f -exec sed -i 's/Ủng hộ/Website me: PhucAnhIT.Click/g' {} + 2>/dev/null || true
            find tmp -type f -exec sed -i 's/Copyright @ 2025 by BVN999/Copyright @ 2026 by PAIT Repo/g' {} + 2>/dev/null || true
            find tmp -type f -exec sed -i 's/Nhóm trò chuyện Tele BVN Repo/Trang Repo/g' {} + 2>/dev/null || true
            
            # Đóng gói đè lại
            dpkg-deb -b tmp "$file"
            rm -rf tmp
          done
          cd ..

      - name: Build Packages List
        run: |
          # Xóa sạch bản cũ để build mới
          rm -f Packages Packages.bz2 Packages.gz
          
          # Quét toàn bộ thư mục debs
          dpkg-scanpackages -m ./debs > Packages
          
          # Hậu kiểm: Xóa nốt những dòng liên quan đến BVN nếu còn sót lại trong file Packages
          sed -i '/bvnrepo999/d' Packages
          sed -i '/bvnsupport/d' Packages
          sed -i '/Depiction: http/d' Packages
          sed -i '/Sileodepiction: http/d' Packages
          
          # Nén file chuẩn cho Sileo
          bzip2 -c9 Packages > Packages.bz2
          gzip -c9 Packages > Packages.gz

      - name: Push Changes
        run: |
          git config --global user.name "PAIT-Bot"
          git config --global user.email "bot@phucanhit.click"
          git add .
          git commit -m "Force Update: Unique ID for every file to show all tweaks" || echo "No changes"
          git push
